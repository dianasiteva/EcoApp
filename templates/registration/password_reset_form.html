{% extends "base.html" %}
{% block title %}Забравена парола{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 500px;">
    <h3 class="mb-3">Забравена парола</h3>
    <p class="text-muted">Въведете имейла си и ще получите линк за смяна на паролата.</p>

    <form method="post" class="card p-4 shadow-sm">
        {% csrf_token %}
        {{ form.email.label_tag }}
        {{ form.email }}

        <button type="submit" class="btn btn-primary mt-3 w-100">Изпрати линк</button>
    </form>
</div>
{% endblock %}
