{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h3>Моят профил</h3>
    <hr>


    <p><strong>Потребителско име:</strong> {{ user.email }}</p>
    <p><strong>Дата на регистрация:</strong> {{ user.date_joined }}</p>
    <p><strong>Последно влизане:</strong> {{ user.last_login }} </p>
    {% if user.is_staff %}
    <p><strong>Роля:</strong> Администратор</p>
    {% else %}
    <p><strong>Роля:</strong> Потребител</p>
    {% endif %}
</div>
{% endblock %}
