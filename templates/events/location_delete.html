{% extends 'base.html' %}
{% block title %}Изтриване на локация{% endblock %}

{% block content %}
<h2>Are you sure you want to delete "{{ location.name }}"?</h2>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'location_detail' location.pk %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
