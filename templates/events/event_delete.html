{% extends 'base.html' %}
{% block title %}Delete Event{% endblock %}

{% block content %}
<h2>Are you sure you want to delete "{{ event }}"?</h2>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'event_detail' event.pk %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
